<!DOCTYPE html>
<html>
<head>
    <title>Staff Tasks</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; }
        .nav { background-color: green; color: white; padding: 10px; }
        .nav a { color: white; margin-left: 20px; }
        .photo-row img { width: 200px; height: 150px; border: 1px solid black; margin: 10px; }
        .task-box { border: 2px solid blue; margin: 20px auto; width: 80%; padding: 15px; text-align: left; }
        .complete-btn { background-color: green; color: white; padding: 10px; width: 100%; cursor: pointer; }
    </style>
</head>
<body onload="showTasks()">

<div class="nav">
    <strong>Staff Portal</strong>
    <a href="index.html">Logout</a>
</div>

<img src="Screenshot 2026-01-28 104451.png" alt="Logo" width="150">
<h1>My Work List</h1>
<p>User: <span id="userSpan"></span></p>

<div class="photo-row">
    <img src="istockphoto.png">
    <img src="friendly-golden-retriever.png">
    <img src="istockphoto_.png">
</div>

<div id="tasksDiv"></div>

<script>
    function showTasks() {
        const user = localStorage.getItem('logged_in_user');
        document.getElementById('userSpan').innerText = user;
        const tasksDiv = document.getElementById('tasksDiv');
        const data = JSON.parse(localStorage.getItem('animalBranch_data') || "[]");

        const filtered = data.filter(t => t.assignedTo === user && t.status === "Assigned");

        if(filtered.length === 0) {
            tasksDiv.innerHTML = "<p>No tasks assigned to you right now.</p>";
        } else {
            filtered.forEach(t => {
                tasksDiv.innerHTML += `
                    <div class="task-box">
                        <h3>Job for: ${t.name} (Price: ${t.price})</h3>
                        <p><strong>Address:</strong> ${t.address}</p>
                        <p><strong>Phone:</strong> ${t.phone}</p>
                        <p><strong>Service:</strong> ${t.service}</p>
                        <p><strong>Time:</strong> ${t.time}</p>
                        <p><strong>Comments:</strong> ${t.comments || "None"}</p>
                        <button class="complete-btn" onclick="done(${t.id})">Click to Complete and Bill Customer</button>
                    </div>`;
            });
        }
    }

    function done(id) {
        let data = JSON.parse(localStorage.getItem('animalBranch_data'));
        let billing = JSON.parse(localStorage.getItem('animalBranch_billing') || "[]");
        const idx = data.findIndex(t => t.id === id);

        data[idx].status = "Completed";
        billing.push({
            date: new Date().toLocaleDateString(),
            pet: data[idx].name,
            service: data[idx].service,
            amount: data[idx].price
        });

        localStorage.setItem('animalBranch_data', JSON.stringify(data));
        localStorage.setItem('animalBranch_billing', JSON.stringify(billing));
        alert("Job finished!");
        location.reload();
    }
</script>
</body>
</html>
