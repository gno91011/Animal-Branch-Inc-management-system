<script>
    function completeJob(apptId) {
        let data = JSON.parse(localStorage.getItem('animalBranch_data'));
        const index = data.findIndex(a => a.id === apptId);
        
        data[index].status = "Completed"; 

        // CREATE BILLING RECORD
        let billing = JSON.parse(localStorage.getItem('animalBranch_billing') || "[]");
        billing.push({
            date: new Date().toLocaleDateString(),
            pet: data[index].name,
            service: data[index].service,
            amount: data[index].price,
            staff: data[index].assignedTo
        });
        
        localStorage.setItem('animalBranch_billing', JSON.stringify(billing));
        localStorage.setItem('animalBranch_data', JSON.stringify(data));
        
        alert("Service Completed! Billing info sent to system.");
        loadStaffTasks();
    }
</script>
