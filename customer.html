<!DOCTYPE html>
<html>
<head>
    <title>Customer Portal</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: white; padding: 20px; text-align: center; }
        .nav-bar { background-color: #333; color: white; padding: 10px; margin-bottom: 20px; }
        .nav-bar a { color: white; text-decoration: none; margin: 0 15px; font-weight: bold; }
        
        .logo-container img { width: 150px; margin-bottom: 10px; }
        .photo-row img { width: 200px; height: 150px; border: 1px solid black; margin: 10px; }
        
        .booking-form { 
            border: 1px solid black; 
            padding: 20px; 
            width: 450px; 
            margin: 0 auto; 
            text-align: left; 
            background-color: #f9f9f9; 
        }
        
        input, select, textarea { 
            width: 100%; 
            padding: 8px; 
            margin: 5px 0 15px 0; 
            display: block; 
            box-sizing: border-box; 
        }
        
        .submit-button { 
            background-color: green; 
            color: white; 
            padding: 10px; 
            width: 100%; 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
        }
    </style>
</head>
<body onload="loadHistory()">

<div class="nav-bar">
    <strong>Animal Branch: Customer Portal</strong>
    <a href="billing.html">View My Bills</a>
    <a href="index.html" style="color: red;">Logout</a>
</div>

<div class="logo-container">
    <img src="Screenshot 2026-01-28 104451.png" alt="Logo">
</div>

<h1>Book a Service</h1>

<div class="photo-row">
    <img src="istockphoto.png">
    <img src="friendly-golden-retriever.png">
    <img src="istockphoto_.png">
</div>

<div class="booking-form">
    <label>Pet Name:</label>
    <input type="text" id="pName">

    <label>Phone Number:</label>
    <input type="text" id="pPhone" placeholder="555-0123">

    <label>Email Address:</label>
    <input type="text" id="pEmail" placeholder="name@email.com">

    <label>Service Address:</label>
    <input type="text" id="pAddress" placeholder="123 Main St, Apt 4">

    <label>Select Service:</label>
    <select id="pService">
        <option value="30 Minute Dog Walk|$25.00">30 Minute Dog Walk - $25.00</option>
        <option value="45 Minute Dog Walk|$35.00">45 Minute Dog Walk - $35.00</option>
        <option value="60 Minute Dog Walk|$45.00">60 Minute Dog Walk - $45.00</option>
        
        <option value="Cat Care (Feeding & Litter)|$25.00">Cat Care (Feeding & Litter) - $25.00</option>
        
        <option value="Pet Grooming|$55.00">Pet Grooming - $55.00</option>
        <option value="Overnight Stay|$85.00">Overnight Stay - $85.00</option>
    </select>

    <label>Date and Time:</label>
    <input type="datetime-local" id="pTime">

    <label>Comments for Employee:</label>
    <textarea id="pComments" rows="3" placeholder="Gate code is 1234..."></textarea>

    <button class="submit-button" onclick="sendRequest()">Submit Request</button>
</div>

<hr>
<h3>My Recent Requests</h3>
<table border="1" style="width:80%; margin: 0 auto;">
    <thead>
        <tr>
            <th>Pet</th>
            <th>Service</th>
            <th>Time</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody id="historyTable"></tbody>
</table>

<script>
    function sendRequest() {
        const name = document.getElementById('pName').value;
        const phone = document.getElementById('pPhone').value;
        const email = document.getElementById('pEmail').value;
        const address = document.getElementById('pAddress').value;
        const time = document.getElementById('pTime').value;
        const comments = document.getElementById('pComments').value;
        const serviceData = document.getElementById('pService').value.split('|');

        if(!name || !phone || !email || !address || !time) {
            alert("Please fill out all contact and service info!");
            return;
        }

        const newRequest = {
            id: Date.now(),
            customerUser: localStorage.getItem('logged_in_user'),
            name: name,
            phone: phone,
            email: email,
            address: address,
            service: serviceData[0],
            price: serviceData[1],
            time: time,
            comments: comments,
            status: "Pending",
            assignedTo: "None"
        };

        let data = JSON.parse(localStorage.getItem('animalBranch_data') || "[]");
        data.push(newRequest);
        localStorage.setItem('animalBranch_data', JSON.stringify(data));

        alert("Request sent for " + name);
        location.reload();
    }

    function loadHistory() {
        const table = document.getElementById('historyTable');
        const data = JSON.parse(localStorage.getItem('animalBranch_data') || "[]");
        const currentUser = localStorage.getItem('logged_in_user');
        
        const myData = data.filter(item => item.customerUser === currentUser);
        
        myData.forEach(item => {
            let row = table.insertRow();
            row.innerHTML = `<td>${item.name}</td><td>${item.service}</td><td>${item.time}</td><td>${item.status}</td>`;
        });
    }
</script>

</body>
</html>
