<!DOCTYPE html>
<html>
<head>
    <title>Customer Portal | Animal Branch</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f9f9f9; margin: 0; }
        nav { background: #2c3e50; padding: 15px; color: white; text-align: right; }
        nav a { color: white; margin-left: 20px; text-decoration: none; font-weight: bold; }
        
        .container { max-width: 1000px; margin: 20px auto; padding: 20px; text-align: center; }
        
        /* Logo Styling */
        .main-logo { width: 250px; height: auto; margin-bottom: 20px; display: inline-block; }

        /* Pop Gallery - Forced Visibility */
        .pop-gallery { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            margin: 20px 0; 
            min-height: 150px; /* Forces the area to stay open */
        }
        .pop-gallery img { 
            width: 200px; 
            height: 150px; 
            object-fit: cover; 
            border-radius: 12px; 
            border: 2px solid #ddd;
            background-color: #eee; /* Shows a grey box if image is missing */
            display: block;
        }

        /* Content Layout */
        .content-grid { display: flex; gap: 30px; margin-top: 30px; text-align: left; }
        .card { background: white; padding: 25px; border-radius: 10px; border: 1px solid #ddd; flex: 1; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        /* Service Repository Table */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #f4f7f6; color: #2c3e50; }
        
        .btn { background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<nav>
    <span style="float:left;">Welcome to the Animal Branch Portal</span>
    <a href="index.html" style="color: #e74c3c;">Logout</a>
</nav>

<div class="container">
    <img src="Screenshot 2026-01-28 104451.png" alt="Logo" class="main-logo">

    <div class="gallery">
        <img src="istockphoto.png" alt="Photo 1">
        <img src="friendly-golden-retriever.png" alt="Photo 2">
        <img src="istockphoto_.png" alt="Photo 3">
    </div>

    <div class="content-grid">
        <div class="card">
            <h3>My Pet's Profile</h3>
            <label>Pet Name</label>
            <input type="text" placeholder="Enter Name" style="width:100%; padding:8px; margin: 8px 0;">
            <label>Notes</label>
            <textarea style="width:100%; padding:8px; margin: 8px 0;" placeholder="Medical or dietary notes..."></textarea>
            <button class="btn" onclick="alert('Profile Updated')">Update Info</button>
        </div>

        <div class="card">
            <h3>Service History & Requests</h3>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Service Type</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="service-list">
                    <tr>
                        <td>---</td>
                        <td>No services requested yet</td>
                        <td>---</td>
                    </tr>
                </tbody>
            </table>
            <button class="btn" style="background:#3498db;" onclick="addRequest()">Request New Service</button>
        </div>
    </div>
</div>

<script>
    function addRequest() {
        const table = document.getElementById('service-list');
        const row = table.insertRow(0);
        row.innerHTML = `<td>New</td><td>Pending Service</td><td>Awaiting Approval</td>`;
    }
</script>

</body>
</html>
