<!DOCTYPE html>
<html>
<head><title>Customer Portal</title></head>
<body style="font-family: Arial; padding: 20px;">
    <h1>🐾 Pet Owner: Service Request</h1>
    <a href="index.html">Logout</a>
    <hr>

    <div style="max-width: 500px; background: #f9f9f9; padding: 20px; border: 1px solid #ccc;">
        <h3>New Pet Profile & Request</h3>
        <label>Pet Name:</label><br>
        <input type="text" id="pet" style="width:100%"><br><br>
        
        <label>Medical Notes (Allergies/Meds):</label><br>
        <textarea id="meds" style="width:100%"></textarea><br><br>
        
        <label>Home Entry (Lockbox/Codes):</label><br>
        <input type="text" id="code" style="width:100%"><br><br>
        
        <button onclick="save()" style="background:#27ae60; color:white; padding:10px; width:100%; border:none;">Submit to Animal Branch</button>
    </div>

    <div id="result" style="margin-top:20px; font-weight:bold; color:green;"></div>

    <script>
        function save() {
            const pet = document.getElementById('pet').value;
            document.getElementById('result').innerText = "Successfully saved profile for " + pet + ". Management has been notified.";
        }
    </script>
</body>
</html>
