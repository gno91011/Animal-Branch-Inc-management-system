<div class="container">
    <div class="card">
        <h2>Service Billing & Invoices</h2>
        <table>
            <thead>
                <tr><th>Date</th><th>Pet Name</th><th>Service</th><th>Total Due</th></tr>
            </thead>
            <tbody id="billing-table"></tbody>
        </table>
        <h3 id="total-revenue" style="text-align: right; color: #27ae60;">Total: $0.00</h3>
    </div>
</div>

<script>
    function loadBilling() {
        const table = document.getElementById('billing-table');
        const billingData = JSON.parse(localStorage.getItem('animalBranch_billing') || "[]");
        let total = 0;

        billingData.forEach(item => {
            let row = table.insertRow();
            row.innerHTML = `<td>${item.date}</td><td>${item.pet}</td><td>${item.service}</td><td><strong>${item.amount}</strong></td>`;
            total += parseFloat(item.amount.replace('$', ''));
        });
        document.getElementById('total-revenue').innerText = "Total Balance: $" + total.toFixed(2);
    }
    window.onload = loadBilling;
</script>
