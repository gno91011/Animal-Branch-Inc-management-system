<!DOCTYPE html>
<html>
<head><title>Billing</title></head>
<body style="font-family: Arial; padding: 20px;">
    <h1>💰 Billing & Payment Tracker</h1>
    <a href="schedule.html">Back to Dashboard</a>
    <hr>
    
    <table border="1" cellpadding="10" style="width: 100%; border-collapse: collapse;">
        <tr style="background: #eee;">
            <th>Client Name</th><th>Due Date</th><th>Amount</th><th>Status</th>
        </tr>
        <tr>
            <td><input type="text" placeholder="Client Name"></td>
            <td><input type="date"></td>
            <td><input type="text" placeholder="$0.00"></td>
            <td>
                <select>
                    <option>Unpaid</option>
                    <option>Paid</option>
                </select>
            </td>
        </tr>
    </table>
    <p><i>Note: Use this table to mitigate missed payments and track billing cycles.</i></p>
</body>
</html>
