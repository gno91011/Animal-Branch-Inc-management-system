<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Branch Inc. | Staff Portal</title>
    <style>
        /* BEGINNER-FRIENDLY STYLING (Internal CSS) */
        :root { --primary: #2c3e50; --secondary: #27ae60; --light: #ecf0f1; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background-color: var(--light); }
        
        /* Navigation */
        nav { background: var(--primary); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Auth Container */
        .container { background: white; max-width: 400px; margin: 50px auto; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--secondary); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        button:hover { background: #219150; }

        /* Dashboard */
        .dashboard { max-width: 1000px; margin: 20px auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .pet-card { background: white; padding: 20px; border-radius: 10px; border-left: 5px solid var(--secondary); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .hidden { display: none; }
        
        /* Highlight for add pet box */
        .add-pet-box { background: #fff; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 2px dashed var(--primary); }
    </style>
</head>
<body>

    <nav>
        <div>🐾 Animal Branch Inc.</div>
        <div id="nav-links" class="hidden"><button onclick="location.reload()" style="width:auto; background:var(--danger)">Logout</button></div>
    </nav>

    <div id="auth-section" class="container">
        <div id="login-form">
            <h2>Staff Login</h2>
            <input type="text" id="user" placeholder="Username (admin)">
            <input type="password" id="pass" placeholder="Password (pass123)">
            <button onclick="checkLogin()">Access System</button>
            <p>New staff? <a href="#" onclick="toggleAuth()">Create Account</a></p>
        </div>
        <div id="reg-form" class="hidden">
            <h2>Register</h2>
            <input type="text" id="regName" placeholder="Full Name">
            <input type="password" placeholder="Password">
            <button onclick="doRegister()">Sign Up</button>
            <p><a href="#" onclick="toggleAuth()">Back to Login</a></p>
        </div>
        <p id="msg"></p>
    </div>

    <div id="dashboard" class="dashboard hidden">
        <h1>Welcome, <span id="display-name"></span></h1>
        
        <div class="add-pet-box">
            <h3>➕ Add New Pet Visit</h3>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="newPetName" placeholder="Pet Name">
                <input type="text" id="newPetTask" placeholder="Task (e.g. Walk)">
                <button onclick="addNewPet()" style="width: 150px;">Add</button>
            </div>
        </div>

        <div class="grid" id="pet-grid">
            <div class="pet-card">
                <h3>Buddy (Golden Retriever)</h3>
                <p><strong>Keys:</strong> Lockbox 4455 | <strong>Task:</strong> 20 min walk</p>
                <button onclick="alert('Visit Logged!')">Complete</button>
            </div>
        </div>
    </div>

    <script>
        function toggleAuth() {
            document.getElementById('login-form').classList.toggle('hidden');
            document.getElementById('reg-form').classList.toggle('hidden');
        }

        function checkLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "admin" && p === "pass123") {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('nav-links').classList.remove('hidden');
                document.getElementById('display-name').innerText = u;
            } else {
                document.getElementById('msg').innerText = "❌ Invalid Credentials";
                document.getElementById('msg').style.color = "red";
            }
        }

        function addNewPet() {
            const name = document.getElementById('newPetName').value;
            const task = document.getElementById('newPetTask').value;
            if(!name || !task) return alert("Fill both fields!");
            
            const card = document.createElement('div');
            card.className = 'pet-card';
            card.innerHTML = `<h3>${name}</h3><p><strong>Keys:</strong> TBD | <strong>Task:</strong> ${task}</p><button onclick="alert('Visit Logged!')">Complete</button>`;
            document.getElementById('pet-grid').prepend(card);
            document.getElementById('newPetName').value = ""; document.getElementById('newPetTask').value = "";
        }
        
        function doRegister() { alert("Account request sent to management!"); toggleAuth(); }
    </script>
</body>
</html>
