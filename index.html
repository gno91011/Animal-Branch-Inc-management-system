<!DOCTYPE html>
<html>
<head>
    <title>Animal Branch Inc. | Secure Portal</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; text-align: center; border: 1px solid #ddd; }
        input, select { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 95%; padding: 10px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
        .toggle-link { color: #3498db; cursor: pointer; font-size: 0.9em; text-decoration: underline; margin: 5px; display: inline-block; }
    </style>
</head>
<body>

<div class="login-card">
    <img src="Screenshot 2026-01-28 104451.png" alt="Logo" style="width: 100%; margin-bottom: 20px; border-radius: 8px;">
    
    <div id="login-box">
        <h2>System Login</h2>
        <select id="role">
            <option value="staff">Staff / Manager</option>
            <option value="owner">Pet Owner</option>
        </select>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="login()">Sign In</button>
        <hr>
        <p>Register as: <br>
           <span class="toggle-link" onclick="showReg('staff')">New Staff</span> | 
           <span class="toggle-link" onclick="showReg('customer')">New Customer</span>
        </p>
    </div>

    <div id="reg-box" class="hidden">
        <h2 id="reg-title">Registration</h2>
        <input type="text" placeholder="Full Name">
        <input type="email" placeholder="Email Address">
        <input type="password" placeholder="Create Password">
        <button onclick="submitReg()">Create Account</button>
        <p><span class="toggle-link" onclick="showLogin()">Back to Login</span></p>
    </div>
</div>

<script>
    function showReg(type) {
        document.getElementById('login-box').classList.add('hidden');
        document.getElementById('reg-box').classList.remove('hidden');
        document.getElementById('reg-title').innerText = (type === 'staff') ? "Staff Registration" : "Customer Registration";
    }

    function showLogin() {
        document.getElementById('reg-box').classList.add('hidden');
        document.getElementById('login-box').classList.remove('hidden');
    }

    function submitReg() {
        alert("Account Created! You can now log in.");
        showLogin();
    }

    function login() {
        const role = document.getElementById('role').value;
        const user = document.getElementById('user').value;
        if(!user) { alert("Please enter a username"); return; }
        
        // Redirects based on role
        if(role === 'staff') { window.location.href = "schedule.html"; } 
        else { window.location.href = "customer.html"; }
    }
</script>
</body>
</html>
