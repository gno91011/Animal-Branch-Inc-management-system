<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
    <style>
        /* This section puts everything in the exact center of the screen */
        body { 
            font-family: Arial, sans-serif; 
            background-color: #f0f0f0; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
        }

        .header-nav { 
            background-color: #333; 
            color: white; 
            width: 100%; 
            padding: 10px; 
            text-align: center; 
            position: fixed; 
            top: 0; 
        }

        .main-container {
            margin-top: 60px; /* Space for the fixed nav */
            text-align: center;
            width: 100%;
            max-width: 700px; /* Limits width so photos and card stay even */
        }

        /* The 3 Photos - even and centered */
        .photo-gallery {
            display: block;
            margin-bottom: 20px;
        }

        .photo-gallery img {
            width: 200px;
            height: 150px;
            border: 2px solid white;
            margin: 5px;
        }

        /* The Login Card - centered below photos */
        .login-box {
            background-color: white;
            border: 1px solid black;
            padding: 20px;
            width: 400px;
            margin: 0 auto; /* Centers the box */
            text-align: left;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
            box-sizing: border-box;
        }

        .login-button {
            background-color: blue;
            color: white;
            width: 100%;
            padding: 10px;
            cursor: pointer;
            border: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="header-nav">
    Animal Branch Inc. Portal
</div>

<div class="main-container">
    <img src="Screenshot 2026-01-28 104451.png" alt="Logo" width="150">
    <h2>Secure Login</h2>

    <div class="photo-gallery">
        <img src="istockphoto.png">
        <img src="friendly-golden-retriever.png">
        <img src="istockphoto.png">
    </div>

    <div class="login-box">
        <label>Username:</label>
        <input type="text" id="username">
        
        <label>Password:</label>
        <input type="password" id="password">
        
        <label>Select Role:</label>
        <select id="role">
            <option value="customer">Customer</option>
            <option value="staff">Staff Member</option>
            <option value="manager">Manager</option>
        </select>

        <button class="login-button" onclick="login()">Login</button>
    </div>
</div>

<script>
    function login() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const role = document.getElementById('role').value;

        // Manager Login
        if (user === "admin" && pass === "staff123") {
            localStorage.setItem('logged_in_user', 'Admin');
            window.location.href = "schedule.html";
            return;
        }

        // Check LocalStorage for other users
        const savedData = localStorage.getItem(user);
        if (savedData) {
            const userData = JSON.parse(savedData);
            if (userData.password === pass) {
                localStorage.setItem('logged_in_user', user);
                
                if (role === "manager") {
                    window.location.href = "schedule.html";
                } else if (role === "staff") {
                    window.location.href = "staff-tasks.html";
                } else {
                    window.location.href = "customer.html";
                }
            } else {
                alert("Wrong password");
            }
        } else {
            alert("User not found");
        }
    }
</script>

</body>
</html>
