<!DOCTYPE html>
<html>
<head>
    <title>Animal Branch Inc. | Gateway</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 380px; text-align: center; border: 1px solid #ddd; }
        .main-logo { width: 100%; max-height: 200px; object-fit: contain; margin-bottom: 20px; }
        input, select { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 95%; padding: 10px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
        .toggle-link { color: #3498db; cursor: pointer; font-size: 0.85em; text-decoration: underline; margin-top: 10px; display: inline-block; }
    </style>
</head>
<body>
<div class="login-card">
    <img src="Screenshot 2026-01-28 104451.png" alt="Logo" class="main-logo">
    
    <div id="login-box">
        <h2>System Login</h2>
        <select id="role">
            <option value="staff">Employee / Manager</option>
            <option value="owner">Customer</option>
        </select>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" placeholder="Password">
        <button onclick="login()">Sign In</button>
        <p>Registration: <br>
           <span class="toggle-link" onclick="toggle('staff')">New Employee</span> | 
           <span class="toggle-link" onclick="toggle('customer')">New Customer</span>
        </p>
    </div>

    <div id="reg-box" class="hidden">
        <h2 id="reg-title">Registration</h2>
        <input type="text" placeholder="Full Name">
        <input type="email" placeholder="Email Address">
        <input type="password" placeholder="Create Password">
        <button onclick="alert('Account created!'); location.reload();">Submit</button>
        <p><span class="toggle-link" onclick="location.reload()">Back to Login</span></p>
    </div>
</div>
<script>
    function toggle(type) {
        document.getElementById('login-box').classList.add('hidden');
        document.getElementById('reg-box').classList.remove('hidden');
        document.getElementById('reg-title').innerText = type === 'staff' ? 'Employee Registration' : 'Customer Registration';
    }
    function login() {
        const role = document.getElementById('role').value;
        if(!document.getElementById('email').value) { alert("Email required"); return; }
        window.location.href = (role === 'staff') ? "schedule.html" : "customer.html";
    }
</script>
</body>
</html>
