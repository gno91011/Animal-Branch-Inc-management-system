<!DOCTYPE html>
<html>
<head>
    <title>Animal Branch Inc. | Secure Portal</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; text-align: center; border: 1px solid #ddd; }
        input, select { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 95%; padding: 10px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
        .toggle-link { color: #3498db; cursor: pointer; font-size: 0.9em; text-decoration: underline; }
    </style>
</head>
<body>

<div class="login-card">
    <img src="your-photo-name.png" alt="Animal Branch Logo" style="width: 100%; margin-bottom: 20px; border-radius: 8px;">
    
    <div id="login-box">
        <h2>System Login</h2>
        <select id="role">
            <option value="staff">Staff / Manager</option>
            <option value="owner">Pet Owner</option>
        </select>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="login()">Sign In</button>
        <p>New Staff? <span class="toggle-link" onclick="toggle()">Request Account</span></p>
    </div>

    <div id="reg-box" class="hidden">
        <h2>Staff Registration</h2>
        <input type="text" placeholder="Full Name">
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">
        <button onclick="alert('Request Sent to Management!'); toggle();">Submit Request</button>
        <p><span class="toggle-link" onclick="toggle()">Back to Login</span></p>
    </div>
</div>

<script>
    function toggle() {
        document.getElementById('login-box').classList.toggle('hidden');
        document.getElementById('reg-box').classList.toggle('hidden');
    }
    function login() {
        const role = document.getElementById('role').value;
        if(!document.getElementById('user').value) { alert("Enter Username"); return; }
        
        if(role === 'staff') { window.location.href = "schedule.html"; } 
        else { window.location.href = "customer.html"; }
    }
</script>
</body>
</html>
