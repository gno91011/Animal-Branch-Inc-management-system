<!DOCTYPE html>
<html>
<head>
    <title>Staff Schedule</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid black; padding: 10px; text-align: left; }
        th { background-color: #34495e; color: white; }
        .status-done { color: green; font-weight: bold; }
    </style>
</head>
<body>
    <h1>📅 Staff Daily Visit Log</h1>
    <p>Management can review assignments here.</p>
    
    <table>
        <tr>
            <th>Time</th>
            <th>Pet & Address</th>
            <th>Instructions/Notes</th>
            <th>Status</th>
        </tr>
        <tr>
            <td>09:00 AM</td>
            <td>Buddy (123 Maple St)</td>
            <td>Back door unlocked. Use leash in hallway.</td>
            <td class="status-done">Completed</td>
        </tr>
        <tr>
            <td>11:30 AM</td>
            <td>Whiskers (456 Oak Ave)</td>
            <td>Feed 1/2 cup dry food. Clean litter.</td>
            <td><button onclick="this.parentElement.innerText='Done'">Mark Done</button></td>
        </tr>
    </table>
    <br>
    <a href="index.html">Back to Home</a>
</body>
</html>
