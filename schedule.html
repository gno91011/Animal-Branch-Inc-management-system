<!DOCTYPE html>
<html>
<head>
    <title>Management Dashboard | Animal Branch Inc.</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; color: #333; }
        
       
        nav { background: #2c3e50; padding: 15px 30px; color: white; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        nav .brand { font-size: 1.4em; font-weight: bold; letter-spacing: 1px; }
        nav .links a { color: #ecf0f1; text-decoration: none; font-weight: bold; margin-left: 20px; transition: 0.3s; }
        nav .links a:hover { color: #27ae60; }
        nav .logout-btn { color: #e74c3c !important; border: 1px solid #e74c3c; padding: 5px 15px; border-radius: 4px; }
        nav .logout-btn:hover { background: #e74c3c; color: white !important; }

        .container { padding: 30px; max-width: 1100px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 8px; margin-bottom: 30px; border: 1px solid #ddd; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h3 { margin-top: 0; color: #2c3e50; border-left: 5px solid #27ae60; padding-left: 15px; }
        
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 15px; }
        th, td { border: 1px solid #eee; padding: 15px; text-align: left; }
        th { background: #f8f9fa; color: #2c3e50; font-weight: 600; text-transform: uppercase; font-size: 0.85em; }
        
        
        .btn-assign { background: #27ae60; color: white; border: none; padding: 8px 20px; cursor: pointer; border-radius: 4px; font-weight: bold; transition: 0.3s; }
        .btn-assign:hover { background: #219150; }
        select { padding: 8px; border-radius: 4px; border: 1px solid #ccc; width: 200px; background: white; }
        
        .empty-msg { text-align: center; color: #999; padding: 30px; font-style: italic; }
    </style>
</head>
<body onload="initManagerData()">

<nav>
    <div class="brand">Animal Branch: Management</div>
    <div class="links">
        <a href="billing.html">Billing</a>
        <a href="customer.html">Customer View</a>
        <a href="index.html" class="logout-btn">Logout</a>
    </div>
</nav>

<div class="container">

    <div class="card">
        <h3>Staff Directory</h3>
        <p style="font-size: 0.85em; color: #666;">New staff members appear here automatically upon registration.</p>
        <table>
            <thead>
                <tr><th>Staff Username</th><th>Role</th><th>Status</th></tr>
            </thead>
            <tbody id="staff-list">
                </tbody>
        </table>
    </div>

    <div class="card">
        <h3>Task Assignment Queue</h3>
        <table>
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Pet Name</th>
                    <th>Requested Service</th>
                    <th>Assign Staff</th>
                </tr>
            </thead>
            <tbody id="assignment-queue">
                </tbody>
        </table>
    </div>

</div>

<script>
    function initManagerData() {
        const staffBody = document.getElementById('staff-list');
        const queueBody = document.getElementById('assignment-queue');
        
        
        let currentStaff = [];
        staffBody.innerHTML = "";
        
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key === 'animalBranch_data') continue;
            try {
                const user = JSON.parse(localStorage.getItem(key));
                if (user.role === 'staff') {
                    currentStaff.push(user.username);
                    let row = staffBody.insertRow();
                    row.innerHTML = `<td><strong>${user.username}</strong></td><td>${user.role}</td><td><span style="color:green">● Active</span></td>`;
                }
            } catch(e) {}
        }
        if(currentStaff.length === 0) staffBody.innerHTML = "<tr><td colspan='3' class='empty-msg'>No staff members registered yet.</td></tr>";

        
        const data = JSON.parse(localStorage.getItem('animalBranch_data') || "[]");
        const pending = data.filter(a => a.status === "Pending");

        queueBody.innerHTML = "";
        if (pending.length === 0) {
            queueBody.innerHTML = "<tr><td colspan='4' class='empty-msg'>No pending requests from customers.</td></tr>";
        } else {
            pending.forEach(appt => {
                let options = currentStaff.length > 0 
                    ? currentStaff.map(name => `<option value="${name}">${name}</option>`).join('')
                    : `<option disabled>Register staff first</option>`;

                let row = queueBody.insertRow();
                row.innerHTML = `
                    <td>${appt.time}</td>
                    <td><strong>${appt.name}</strong></td>
                    <td>${appt.service}</td>
                    <td>
                        <select id="sel-${appt.id}">${options}</select>
                        <button class="btn-assign" onclick="confirmAssign(${appt.id})">Assign</button>
                    </td>
                `;
            });
        }
    }

    function confirmAssign(apptId) {
        let data = JSON.parse(localStorage.getItem('animalBranch_data'));
        const staffName = document.getElementById(`sel-${apptId}`).value;
        
        const index = data.findIndex(a => a.id === apptId);
        data[index].status = "Assigned";
        data[index].assignedTo = staffName;

        localStorage.setItem('animalBranch_data', JSON.stringify(data));
        alert("Task successfully assigned to " + staffName);
        initManagerData();
    }
</script>

</body>
</html>
