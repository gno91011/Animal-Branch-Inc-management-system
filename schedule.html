<!DOCTYPE html>
<html>
<head>
    <title>Manager Page</title>
    <style>
        body { font-family: "Times New Roman", serif; background-color: white; padding: 20px; }
        nav { border-bottom: 2px solid black; padding-bottom: 10px; margin-bottom: 20px; }
        .section { border: 1px solid black; padding: 15px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid black; padding: 8px; text-align: left; }
        th { background-color: #eeeeee; }
        .logout { color: red; font-weight: bold; }
    </style>
</head>
<body onload="init()">

<nav>
    <strong>Animal Branch Manager Menu</strong> | 
    <a href="billing.html">Billing</a> | 
    <a href="customer.html">Customer View</a> | 
    <a href="index.html" class="logout">LOGOUT</a>
</nav>

<h1>Manager Dashboard</h1>

<div class="section">
    <h3>Staff List</h3>
    <table id="staffTable">
        <thead><tr><th>Username</th><th>Status</th></tr></thead>
        <tbody id="staffBody"></tbody>
    </table>
</div>

<div class="section">
    <h3>New Customer Requests</h3>
    <table id="requestTable">
        <thead>
            <tr>
                <th>Pet & Phone</th>
                <th>Service & Address</th>
                <th>Owner Comments</th>
                <th>Assign To</th>
            </tr>
        </thead>
        <tbody id="requestBody"></tbody>
    </table>
</div>

<div class="section">
    <h3>Assignment Tracking</h3>
    <table id="trackTable">
        <thead>
            <tr>
                <th>Pet Name</th>
                <th>Address</th>
                <th>Assigned Staff</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="trackBody"></tbody>
    </table>
</div>

<script>
    function init() {
        const staffBody = document.getElementById('staffBody');
        const requestBody = document.getElementById('requestBody');
        const trackBody = document.getElementById('trackBody');
        let staffNames = [];

        // Find Staff
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            try {
                const user = JSON.parse(localStorage.getItem(key));
                if (user.role === 'staff') {
                    staffNames.push(user.username);
                    staffBody.innerHTML += "<tr><td>" + user.username + "</td><td>Active</td></tr>";
                }
            } catch(e) {}
        }

        const data = JSON.parse(localStorage.getItem('animalBranch_data') || "[]");
        data.forEach(appt => {
            if (appt.status === "Pending") {
                let options = staffNames.map(name => "<option value='"+name+"'>"+name+"</option>").join('');
                requestBody.innerHTML += `
                    <tr>
                        <td>${appt.name}<br>(${appt.phone})</td>
                        <td>${appt.service}<br>${appt.address}</td>
                        <td>${appt.comments || "None"}</td>
                        <td>
                            <select id="sel-${appt.id}">${options}</select>
                            <button onclick="assign(${appt.id})">Assign Now</button>
                        </td>
                    </tr>`;
            } else {
                trackBody.innerHTML += `
                    <tr>
                        <td>${appt.name}</td>
                        <td>${appt.address}</td>
                        <td>${appt.assignedTo}</td>
                        <td>${appt.status}</td>
                    </tr>`;
            }
        });
    }

    function assign(id) {
        let data = JSON.parse(localStorage.getItem('animalBranch_data'));
        const staffName = document.getElementById("sel-" + id).value;
        const index = data.findIndex(a => a.id === id);
        data[index].status = "Assigned";
        data[index].assignedTo = staffName;
        localStorage.setItem('animalBranch_data', JSON.stringify(data));
        location.reload();
    }
</script>
</body>
</html>
