<body onload="syncManagerDashboard()">
    <div class="card">
        <h3>Incoming Requests (Assign Staff)</h3>
        <table>
            <thead>
                <tr><th>Pet</th><th>Service</th><th>Select Staff</th><th>Action</th></tr>
            </thead>
            <tbody id="manager-appt-table"></tbody>
        </table>
    </div>

<script>
    function syncManagerDashboard() {
        const table = document.getElementById('manager-appt-table');
        const data = JSON.parse(localStorage.getItem('animalBranch_data') || "[]");
        table.innerHTML = "";

        data.filter(a => a.status === "Pending").forEach((appt, index) => {
            let row = table.insertRow();
            row.innerHTML = `
                <td>${appt.name}</td>
                <td>${appt.service}</td>
                <td>
                    <select id="staff-select-${appt.id}">
                        <option value="Sarah Jenkins">Sarah Jenkins</option>
                        <option value="Mark Peterson">Mark Peterson</option>
                    </select>
                </td>
                <td><button class="btn-assign" onclick="assignJob(${appt.id})">Confirm Assignment</button></td>
            `;
        });
    }

    function assignJob(apptId) {
        let data = JSON.parse(localStorage.getItem('animalBranch_data'));
        const staffName = document.getElementById(`staff-select-${apptId}`).value;
        
        // Find the appointment by ID and update it
        const index = data.findIndex(a => a.id === apptId);
        data[index].status = "Assigned";
        data[index].assignedTo = staffName;

        localStorage.setItem('animalBranch_data', JSON.stringify(data));
        alert("Task Assigned to " + staffName);
        syncManagerDashboard(); // Refresh table
    }
</script>
